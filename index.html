<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Random Note Generator</title>
    <style>
        body { font-family: 'Times New Roman', Times, serif; text-align: center; margin-top: 50px; }
        #display { font-size: 24px; margin: 20px; font-weight: bold; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Guitar Practice Generator</h2>
    
    <div id="display">Press the button to start</div>
    
    <button onclick="generate()">Generate Note</button>

    <script>
        const notes = ["C", "C#", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const strings = ["First string", "Second string", "Third string", "Fourth string", "Fifth string", "Sixth string"];

        function generate() {
            // JavaScript's way of picking a random item
            const randomNote = notes[Math.floor(Math.random() * notes.length)];
            const randomString = strings[Math.floor(Math.random() * strings.length)];

            // Display the result in the 'display' div
            document.getElementById('display').innerHTML = 
                `${randomString}<br>${randomNote}`;
        }
    </script>

</body>
</html>
