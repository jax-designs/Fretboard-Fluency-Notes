<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
            text-align: center;
            background-color: #f0f0f0;
        }
        #display { 
            font-size: 100px; 
            font-weight: bold; 
            margin-bottom: 10px; 
        }
        #string-display {
            font-size: 50px;
            color: #444;
            margin-bottom: 30px;
        }
        #currentNote { 
            font-size: 30px; 
            color: #888; 
        }
        button { 
            font-size: 24px; 
            padding: 15px 30px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <div id="display">Press Start</div>
    <div id="string-display"></div>
    <div id="currentNote">Detected: -</div>
    <br>
    <button id="startBtn" onclick="initAudio()">Start Listening</button>

    <script>
        const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const strings = ["1st String", "2nd String", "3rd String", "4th String", "5th String", "6th String"];
        
        let targetNote = "";
        let audioContext, analyser, dataArray;
        let isListening = false;
        let matchStartTime = null;
        const requiredHoldTime = 250; 

        function nextChallenge() {
            let newNote;
            // Loop until we get a note that isn't the current one
            do {
                newNote = notes[Math.floor(Math.random() * notes.length)];
            } while (newNote === targetNote);

            targetNote = newNote;
            const randomString = strings[Math.floor(Math.random() * strings.length)];
            
            document.getElementById('display').innerText = targetNote;
            document.getElementById('string-display').innerText = randomString;
            matchStartTime = null;
        }

        async function initAudio() {
            if (isListening) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioContext.createMediaStreamSource(stream);
            
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 4096; 
            source.connect(analyser);
            
            dataArray = new Float32Array(analyser.fftSize);
            isListening = true;
            document.getElementById('startBtn').style.display = "none";
            nextChallenge();
            updatePitch();
        }

        function updatePitch() {
            analyser.getFloatTimeDomainData(dataArray);
            let freq = autoCorrelate(dataArray, audioContext.sampleRate);
            let noteFound = freq !== -1 ? getNoteFromFrequency(freq) : "-";
            
            document.getElementById('currentNote').innerText = `Detected: ${noteFound}`;

            if (noteFound === targetNote) {
                if (!matchStartTime) {
                    matchStartTime = Date.now();
                } else if (Date.now() - matchStartTime >= requiredHoldTime) {
                    nextChallenge();
                }
            } else {
                if (noteFound !== "-") {
                    matchStartTime = null;
                }
            }
            requestAnimationFrame(updatePitch);
        }

        function getNoteFromFrequency(frequency) {
            const n = Math.round(12 * Math.log2(frequency / 440)) + 69;
            return notes[n % 12];
        }

        function autoCorrelate(buffer, sampleRate) {
            let SIZE = buffer.length;
            let rms = 0;
            for (let i = 0; i < SIZE; i++) rms += buffer[i] * buffer[i];
            if (Math.sqrt(rms / SIZE) < 0.005) return -1;

            let c = new Array(SIZE).fill(0);
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE - i; j++) {
                    c[i] = c[i] + buffer[j] * buffer[j + i];
                }
            }
            let d = 0;
            while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < SIZE; i++) {
                if (c[i] > maxval) {
                    maxval = c[i];
                    maxpos = i;
                }
            }
            return sampleRate / maxpos;
        }
    </script>
</body>
</html>
