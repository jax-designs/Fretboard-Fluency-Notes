<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
            text-align: center;
            background-color: #f0f0f0;
        }
        #display { 
            font-size: 100px; 
            font-weight: bold; 
            margin-bottom: 10px; 
        }
        #string-display {
            font-size: 50px;
            color: #444;
            margin-bottom: 30px;
        }
        #score-display {
            font-size: 24px;
            color: #666;
            margin-top: 20px;
        }
        button { 
            font-size: 24px; 
            padding: 15px 30px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <div id="display">Press Start</div>
    <div id="string-display"></div>
    
    <div id="score-display">
        Score: <span id="currentScore">0</span> | Best: <span id="highScore">0</span>
    </div>

    <br>
    <button id="startBtn" onclick="initAudio()">Start Listening</button>

    <script>
        // --- App State ---
        const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const strings = ["1st String", "2nd String", "3rd String", "4th String", "5th String", "6th String"];
        
        let targetNote = "";
        let audioCtx, analyser, dataArray;
        let active = false;
        
        // Scoring & Persistence
        let score = 0;
        let highscore = localStorage.getItem("fretboard_top_score") || 0;
        document.getElementById('highScore').innerText = highscore;

        // Timing
        let matchTime = null;
        const holdThreshold = 250; // 0.25 seconds

        function nextChallenge() {
            let next;
            // Loop to prevent immediate duplicates
            do {
                next = notes[Math.floor(Math.random() * notes.length)];
            } while (next === targetNote);

            targetNote = next;
            const randString = strings[Math.floor(Math.random() * strings.length)];
            
            document.getElementById('display').innerText = targetNote;
            document.getElementById('string-display').innerText = randString;
            matchTime = null; 
        }

        function handleWin() {
            score++;
            document.getElementById('currentScore').innerText = score;
            
            if (score > highscore) {
                highscore = score;
                document.getElementById('highScore').innerText = highscore;
                localStorage.setItem("fretboard_top_score", highscore);
            }
            nextChallenge();
        }

        async function initAudio() {
            if (active) return;
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 4096; 
            source.connect(analyser);
            
            dataArray = new Float32Array(analyser.fftSize);
            active = true;
            
            document.getElementById('startBtn').style.display = "none";
            nextChallenge();
            process();
        }

        function process() {
            analyser.getFloatTimeDomainData(dataArray);
            let freq = autoCorrelate(dataArray, audioCtx.sampleRate);
            
            let heard = "-";
            if (freq !== -1) {
                const n = Math.round(12 * Math.log2(freq / 440)) + 69;
                heard = notes[n % 12];
            }

            if (heard === targetNote) {
                if (!matchTime) {
                    matchTime = Date.now();
                } else if (Date.now() - matchTime >= holdThreshold) {
                    handleWin();
                }
            } else if (heard !== "-") {
                // Reset if they hit the wrong note entirely
                matchTime = null;
            }

            requestAnimationFrame(process);
        }

        function autoCorrelate(buffer, sampleRate) {
            let total = 0;
            for (let i = 0; i < buffer.length; i++) total += buffer[i] * buffer[i];
            if (Math.sqrt(total / buffer.length) < 0.005) return -1;

            let c = new Array(buffer.length).fill(0);
            for (let i = 0; i < buffer.length; i++) {
                for (let j = 0; j < buffer.length - i; j++) {
                    c[i] = c[i] + buffer[j] * buffer[j + i];
                }
            }
            let d = 0;
            while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < buffer.length; i++) {
                if (c[i] > maxval) {
                    maxval = c[i];
                    maxpos = i;
                }
            }
            return sampleRate / maxpos;
        }
    </script>
</body>
</html>
