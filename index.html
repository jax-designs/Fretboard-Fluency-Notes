<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
            text-align: center;
            background-color: #f0f0f0;
        }
        #display { 
            font-size: 100px; 
            font-weight: bold; 
            margin-bottom: 10px; 
        }
        #string-display {
            font-size: 50px;
            color: #444;
            margin-bottom: 30px;
        }
        #score-display {
            font-size: 24px;
            color: #666;
            margin-top: 20px;
        }
        #leaderboard {
            margin-top: 30px;
            font-size: 18px;
            color: #888;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }
        button { 
            font-size: 24px; 
            padding: 15px 30px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <div id="display">Press Start</div>
    <div id="string-display"></div>
    
    <div id="score-display">
        Current: <span id="currentScore">0</span>
    </div>

    <div id="leaderboard">
        <strong>TOP SCORES</strong><br>
        <span id="scoreList">No scores yet</span>
    </div>

    <br>
    <button id="startBtn" onclick="initAudio()">Start Listening</button>

    <script>
        const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const strings = ["1st String", "2nd String", "3rd String", "4th String", "5th String", "6th String"];
        
        let targetNote = "";
        let audioCtx, analyser, dataArray;
        let active = false;
        
        let score = 0;
        let matchTime = null;
        const holdThreshold = 250; 

        // Load leaderboard on startup
        updateLeaderboardDisplay();

        function nextChallenge() {
            let next;
            do {
                next = notes[Math.floor(Math.random() * notes.length)];
            } while (next === targetNote);

            targetNote = next;
            const randString = strings[Math.floor(Math.random() * strings.length)];
            
            document.getElementById('display').innerText = targetNote;
            document.getElementById('string-display').innerText = randString;
            matchTime = null; 
        }

        function handleWin() {
            score++;
            document.getElementById('currentScore').innerText = score;
            saveScore(score); // Save progress as we go
            nextChallenge();
        }

        function saveScore(current) {
            // Get existing scores or empty array
            let scores = JSON.parse(localStorage.getItem("fretboard_scores")) || [];
            
            // This logic is for a session-based high score
            // If you want it to save only when you "stop", we'd need a stop button
            // For now, let's keep it simple: the leaderboard shows the highest session peaks
            if (!scores.includes(current)) {
                scores.push(current);
            }
            
            // Sort descending and keep top 5
            scores.sort((a, b) => b - a);
            scores = scores.slice(0, 5);
            
            localStorage.setItem("fretboard_scores", JSON.stringify(scores));
            updateLeaderboardDisplay();
        }

        function updateLeaderboardDisplay() {
            const scores = JSON.parse(localStorage.getItem("fretboard_scores")) || [];
            const list = document.getElementById('scoreList');
            if (scores.length === 0) {
                list.innerText = "No scores yet";
            } else {
                list.innerHTML = scores.map((s, i) => `#${i+1}: ${s}`).join("<br>");
            }
        }

        async function initAudio() {
            if (active) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 4096; 
            source.connect(analyser);
            dataArray = new Float32Array(analyser.fftSize);
            active = true;
            document.getElementById('startBtn').style.display = "none";
            nextChallenge();
            process();
        }

        function process() {
            analyser.getFloatTimeDomainData(dataArray);
            let freq = autoCorrelate(dataArray, audioCtx.sampleRate);
            let heard = "-";
            if (freq !== -1) {
                const n = Math.round(12 * Math.log2(freq / 440)) + 69;
                heard = notes[n % 12];
            }

            if (heard === targetNote) {
                if (!matchTime) {
                    matchTime = Date.now();
                } else if (Date.now() - matchTime >= holdThreshold) {
                    handleWin();
                }
            } else if (heard !== "-") {
                matchTime = null;
            }
            requestAnimationFrame(process);
        }

        function autoCorrelate(buffer, sampleRate) {
            let total = 0;
            for (let i = 0; i < buffer.length; i++) total += buffer[i] * buffer[i];
            if (Math.sqrt(total / buffer.length) < 0.005) return -1;
            let c = new Array(buffer.length).fill(0);
            for (let i = 0; i < buffer.length; i++) {
                for (let j = 0; j < buffer.length - i; j++) {
                    c[i] = c[i] + buffer[j] * buffer[j + i];
                }
            }
            let d = 0;
            while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < buffer.length; i++) {
                if (c[i] > maxval) {
                    maxval = c[i];
                    maxpos = i;
                }
            }
            return sampleRate / maxpos;
        }
    </script>
</body>
</html>
