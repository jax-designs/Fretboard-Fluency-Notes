<!DOCTYPE html>
<html>
<head>
    <title>Fretboard Blitz</title>
    <style>
        /* Keeping it super clean for practice */
        body { 
            background: #fafafa;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #222;
        }

        #display { font-size: 160px; font-weight: 900; margin: 0; }
        #string-display { font-size: 50px; color: #555; margin-bottom: 40px; }

        .stats { font-size: 20px; color: #999; text-transform: uppercase; letter-spacing: 2px; }
        #startBtn { 
            padding: 20px 40px; 
            font-size: 20px; 
            font-weight: bold; 
            cursor: pointer;
            border: 3px solid #222;
            background: transparent;
        }
    </style>
</head>
<body>

    <div id="display">START</div>
    <div id="string-display">ready when you are</div>
    
    <div class="stats">
        Current: <span id="tally">0</span> &nbsp; | &nbsp; Best: <span id="best">0</span>
    </div>

    <br><br>
    <button id="startBtn">CLICKS TO START</button>

    <script>
        // --- Setup & Constants ---
        const noteList = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const stringList = ["1st String (e)", "2nd String (B)", "3rd String (G)", "4th String (D)", "5th String (A)", "6th String (E)"];
        
        let goalNote = "";
        let audioCtx, micAnalyser, data;
        let running = false;
        
        // Scoring stuff
        let count = 0;
        let high = localStorage.getItem("fret_rank") || 0;
        document.getElementById('best').innerText = high;

        // Timing config
        let holdStarted = null;
        const requiredHold = 250; // 1/4 second felt best in testing

        // --- Logic ---

        function pickNewNote() {
            let next;
            // Make sure we don't get the same note twice in a row (annoying)
            do {
                next = noteList[Math.floor(Math.random() * noteList.length)];
            } while (next === goalNote);

            goalNote = next;
            const randString = stringList[Math.floor(Math.random() * stringList.length)];
            
            document.getElementById('display').innerText = goalNote;
            document.getElementById('string-display').innerText = randString;
            holdStarted = null; // reset timer
        }

        function scorePoint() {
            count++;
            document.getElementById('tally').innerText = count;
            
            if (count > high) {
                high = count;
                document.getElementById('best').innerText = high;
                localStorage.setItem("fret_rank", high);
            }
        }
